<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAU Bot Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.fade-enter-active {
  transition: all 0.4s ease;
}
.fade-enter-from {
  opacity: 0;
  transform: translateY(10px);
}
</style>

</head>

<body class="bg-gray-950 text-white">

<div id="app" class="max-w-md mx-auto">

  <!-- NAVBAR -->
  <div class="sticky top-0 bg-gray-900 p-4 flex justify-between items-center shadow-lg z-10">
    <h1 class="text-lg font-bold">📊 XAU Bot</h1>
    <button @click="loadData" class="bg-blue-500 px-3 py-1 rounded text-sm">
      Refresh
    </button>
  </div>

  <!-- STATS -->
  <div class="p-4 grid grid-cols-3 gap-3">

    <div class="bg-gray-800 p-3 rounded-xl shadow text-center">
      <p class="text-xs text-gray-400">Total</p>
      <p class="text-lg font-bold">{{ stats.total }}</p>
    </div>

    <div class="bg-green-500/20 p-3 rounded-xl text-center">
      <p class="text-xs">Winrate</p>
      <p class="text-lg font-bold text-green-400">{{ winrate }}%</p>
    </div>

    <div class="bg-blue-500/20 p-3 rounded-xl text-center">
      <p class="text-xs">Avg Score</p>
      <p class="text-lg font-bold text-blue-400">{{ avgScore }}</p>
    </div>

  </div>

  <!-- CHART SECTION -->
  <div class="px-4 mb-4">
    <div class="bg-gray-900 p-4 rounded-xl shadow">
      <p class="text-sm mb-2 text-gray-400">Score Trend</p>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- SIGNAL LIST -->
  <div class="px-4 pb-20">

    <transition-group name="fade">
      <div v-for="s in signals" :key="s.id"
           class="bg-gray-900 mb-3 p-4 rounded-xl shadow">

        <div class="flex justify-between items-center">
          <span :class="s.type==='BUY' ? 'text-green-400' : 'text-red-400'"
                class="font-bold">
            {{ s.type }}
          </span>

          <span :class="scoreClass(s.score)"
                class="text-xs px-2 py-1 rounded">
            {{ s.score }}
          </span>
        </div>

        <div class="text-sm mt-2">
          Entry: {{ s.entry }}
        </div>

        <div class="text-xs text-gray-400">
          SL: {{ s.sl }} | TP: {{ s.tp }}
        </div>

        <div class="text-xs mt-1 text-gray-500">
          {{ parseReason(s.reason) }}
        </div>

        <div class="text-xs mt-1 text-gray-600">
          {{ formatTime(s.timestamp) }}
        </div>

      </div>
    </transition-group>

  </div>

  <!-- NAVBAR BOTTOM -->
  <div class="fixed bottom-0 left-0 right-0 bg-gray-900 p-3 flex justify-around border-t border-gray-800">
    <button class="text-blue-400">Dashboard</button>
    <button class="text-gray-400">History</button>
    <button class="text-gray-400">Settings</button>
  </div>

</div>

<script>
const API = "https://worker-bot.jihadwajib68.workers.dev";

Vue.createApp({
  data() {
    return {
      signals: [],
      stats: {},
      winrate: 0,
      avgScore: 0,
      chart: null
    }
  },

  methods: {

    async loadData() {
      const res = await fetch(API + "/signals");
      this.signals = await res.json();

      const statsRes = await fetch(API + "/stats");
      this.stats = await statsRes.json();

      this.calculate();
      this.renderChart();
    },

    calculate() {
      if (!this.signals.length) return;

      const total = this.signals.length;

      const wins = this.signals.filter(s => s.result === "WIN").length;
      const losses = this.signals.filter(s => s.result === "LOSS").length;

      if (wins + losses > 0) {
        this.winrate = Math.round((wins / (wins + losses)) * 100);
      }

      const sum = this.signals.reduce((a, b) => a + b.score, 0);
      this.avgScore = (sum / total).toFixed(1);
    },

    renderChart() {
      const scores = this.signals.map(s => s.score).slice(0, 20).reverse();

      if (this.chart) this.chart.destroy();

      this.chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
          labels: scores.map((_, i) => i + 1),
          datasets: [{
            label: "Score",
            data: scores,
            tension: 0.4
          }]
        },
        options: {
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: { display: false },
            y: { display: false }
          }
        }
      });
    },

    scoreClass(score) {
      if (score >= 8) return "bg-green-500/20 text-green-400";
      if (score >= 6) return "bg-yellow-500/20 text-yellow-400";
      return "bg-red-500/20 text-red-400";
    },

    parseReason(r) {
      try {
        return JSON.parse(r).join(", ");
      } catch {
        return r;
      }
    },

    formatTime(ts) {
      return new Date(ts * 1000).toLocaleTimeString();
    }

  },

  mounted() {
    this.loadData();
  }

}).mount("#app");
</script>

</body>
</html>
