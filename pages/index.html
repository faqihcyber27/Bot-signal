<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAU Bot Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

</head>

<body class="bg-gray-950 text-white">

<div id="app" class="max-w-md mx-auto">

  <!-- NAVBAR -->
  <div class="sticky top-0 bg-gray-900 p-4 flex justify-between items-center shadow-lg z-10">
    <h1 class="text-lg font-bold">📊 XAU Bot</h1>
    <button @click="loadData" class="bg-blue-500 px-3 py-1 rounded text-sm">
      Refresh
    </button>
  </div>

  <!-- STATS -->
  <div class="p-4 grid grid-cols-2 gap-3">

    <div class="bg-gray-800 p-3 rounded-xl text-center">
      <p class="text-xs text-gray-400">Total Trade</p>
      <p class="text-lg font-bold">{{ stats.total }}</p>
    </div>

    <div class="bg-green-500/20 p-3 rounded-xl text-center">
      <p class="text-xs">Winrate</p>
      <p class="text-lg font-bold text-green-400">{{ winrate }}%</p>
    </div>

    <div class="bg-blue-500/20 p-3 rounded-xl text-center">
      <p class="text-xs">Profit</p>
      <p class="text-lg font-bold text-blue-400">{{ profit }}</p>
    </div>

    <div class="bg-red-500/20 p-3 rounded-xl text-center">
      <p class="text-xs">Max DD</p>
      <p class="text-lg font-bold text-red-400">{{ maxDD }}</p>
    </div>

    <div class="bg-yellow-500/20 p-3 rounded-xl text-center">
      <p class="text-xs">Profit Factor</p>
      <p class="text-lg font-bold text-yellow-400">{{ profitFactor }}</p>
    </div>

    <div class="bg-purple-500/20 p-3 rounded-xl text-center">
      <p class="text-xs">Avg RR</p>
      <p class="text-lg font-bold text-purple-400">{{ avgRR }}</p>
    </div>

  </div>

  <!-- ACCOUNT -->
  <div class="px-4 mb-4">
    <div class="bg-gray-900 p-4 rounded-xl">
      <p class="text-sm text-gray-400 mb-2">Account</p>
      <div class="text-sm">
        💰 Balance: {{ account.balance }} <br>
        📊 Equity: {{ account.equity }} <br>
        📉 Floating: {{ account.floating }}
      </div>
    </div>
  </div>

  <!-- TRADINGVIEW -->
  <div class="px-4 mb-4">
    <div class="bg-gray-900 p-4 rounded-xl">
      <div id="tv_chart"></div>
    </div>
  </div>

  <!-- EQUITY -->
  <div class="px-4 mb-4">
    <div class="bg-gray-900 p-4 rounded-xl">
      <p class="text-sm text-gray-400 mb-2">Equity Curve</p>
      <canvas id="equityChart"></canvas>
    </div>
  </div>

  <!-- DRAWDOWN -->
  <div class="px-4 mb-4">
    <div class="bg-gray-900 p-4 rounded-xl">
      <p class="text-sm text-gray-400 mb-2">Drawdown</p>
      <canvas id="ddChart"></canvas>
    </div>
  </div>

</div>

<script>
const API = "https://worker-bot.jihadwajib68.workers.dev";

Vue.createApp({
  data() {
    return {
      signals: [],
      stats: {},
      winrate: 0,
      profit: 0,
      maxDD: 0,
      profitFactor: 0,
      avgRR: 0,
      equity: [],
      drawdown: [],
      account: {
        balance: 0,
        equity: 0,
        floating: 0
      },
      equityChart: null,
      ddChart: null,
      tvLoaded: false
    }
  },

  methods: {

    async loadData() {
      const res = await fetch(API + "/signals");
      this.signals = await res.json();

      const statsRes = await fetch(API + "/stats");
      this.stats = await statsRes.json();

      const acc = await fetch(API + "/account");
      this.account = await acc.json();

      this.calculate();
      this.renderCharts();
      this.initTV();
    },

    calculate() {
      let wins = 0, losses = 0;
      let equity = 0;
      let peak = 0;
      let maxDD = 0;

      let grossWin = 0;
      let grossLoss = 0;
      let totalRR = 0;
      let rrCount = 0;

      this.equity = [];
      this.drawdown = [];

      this.signals.slice().reverse().forEach(s => {

        if (s.result === "WIN") {
          wins++;
          grossWin++;
          const rr = Math.abs((s.tp - s.entry) / (s.entry - s.sl));
          totalRR += rr;
          rrCount++;
          equity += rr;
        }

        if (s.result === "LOSS") {
          losses++;
          grossLoss++;
          equity -= 1;
        }

        peak = Math.max(peak, equity);
        const dd = peak - equity;
        maxDD = Math.max(maxDD, dd);

        this.equity.push(equity);
        this.drawdown.push(dd);
      });

      this.winrate = wins + losses > 0
        ? Math.round((wins / (wins + losses)) * 100)
        : 0;

      this.profit = equity.toFixed(2);
      this.maxDD = maxDD.toFixed(2);
      this.profitFactor = grossLoss > 0
        ? (grossWin / grossLoss).toFixed(2)
        : "∞";

      this.avgRR = rrCount > 0
        ? (totalRR / rrCount).toFixed(2)
        : 0;
    },

    renderCharts() {

      if (this.equityChart) this.equityChart.destroy();
      if (this.ddChart) this.ddChart.destroy();

      this.equityChart = new Chart(
        document.getElementById("equityChart"),
        {
          type: "line",
          data: {
            labels: this.equity.map((_,i)=>i+1),
            datasets:[{data:this.equity}]
          }
        }
      );

      this.ddChart = new Chart(
        document.getElementById("ddChart"),
        {
          type: "line",
          data: {
            labels: this.drawdown.map((_,i)=>i+1),
            datasets:[{data:this.drawdown}]
          }
        }
      );
    },

    initTV() {
      if (this.tvLoaded) return;

      new TradingView.widget({
        container_id: "tv_chart",
        symbol: "OANDA:XAUUSD",
        interval: "5",
        theme: "dark",
        height: 400,
        width: "100%"
      });

      this.tvLoaded = true;
    }

  },

  mounted() {
    this.loadData();
    setInterval(()=>this.loadData(),10000);
  }

}).mount("#app");
</script>

</body>
</html>
