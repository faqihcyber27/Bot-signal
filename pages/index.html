<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAU Bot Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.fade-enter-active {
  transition: all 0.4s ease;
}
.fade-enter-from {
  opacity: 0;
  transform: translateY(10px);
}
</style>

</head>

<body class="bg-gray-950 text-white">

<div id="app" class="max-w-md mx-auto">

  <!-- NAVBAR -->
  <div class="sticky top-0 bg-gray-900 p-4 flex justify-between items-center shadow-lg z-10">
    <h1 class="text-lg font-bold">📊 XAU Bot</h1>
    <button @click="loadData" class="bg-blue-500 px-3 py-1 rounded text-sm">
      Refresh
    </button>
  </div>

  <!-- DASHBOARD -->
  <div v-if="tab==='dashboard'">

    <!-- STATS -->
    <div class="p-4 grid grid-cols-3 gap-3">

      <div class="bg-gray-800 p-3 rounded-xl text-center">
        <p class="text-xs text-gray-400">Total</p>
        <p class="text-lg font-bold">{{ stats.total }}</p>
      </div>

      <div class="bg-green-500/20 p-3 rounded-xl text-center">
        <p class="text-xs">Winrate</p>
        <p class="text-lg font-bold text-green-400">{{ winrate }}%</p>
      </div>

      <div class="bg-blue-500/20 p-3 rounded-xl text-center">
        <p class="text-xs">Profit</p>
        <p class="text-lg font-bold text-blue-400">{{ profit }}R</p>
      </div>

    </div>

    <!-- SCORE TREND -->
    <div class="px-4 mb-4">
      <div class="bg-gray-900 p-4 rounded-xl">
        <p class="text-sm text-gray-400 mb-2">Score Trend</p>
        <canvas id="chart"></canvas>
      </div>
    </div>

    <!-- EQUITY -->
    <div class="px-4 mb-4">
      <div class="bg-gray-900 p-4 rounded-xl">
        <p class="text-sm text-gray-400 mb-2">Equity Curve</p>
        <canvas id="equityChart"></canvas>
      </div>
    </div>

    <!-- PIE -->
    <div class="px-4 mb-4">
      <div class="bg-gray-900 p-4 rounded-xl">
        <p class="text-sm text-gray-400 mb-2">Win vs Loss</p>
        <canvas id="pieChart"></canvas>
      </div>
    </div>

  </div>

  <!-- HISTORY -->
  <div v-if="tab==='history'" class="px-4 pb-20">

    <transition-group name="fade">
      <div v-for="s in signals" :key="s.id"
           class="bg-gray-900 mb-3 p-3 rounded-xl">

        <div class="flex justify-between">
          <span :class="s.type==='BUY'?'text-green-400':'text-red-400'">
            {{ s.type }}
          </span>

          <span v-if="s.result==='WIN'" class="text-green-400">WIN</span>
          <span v-else-if="s.result==='LOSS'" class="text-red-400">LOSS</span>
          <span v-else class="text-gray-500">OPEN</span>
        </div>

        <div class="text-xs mt-1">
          Entry {{ s.entry }} | SL {{ s.sl }} | TP {{ s.tp }}
        </div>

      </div>
    </transition-group>

  </div>

  <!-- SETTINGS -->
  <div v-if="tab==='settings'" class="p-4">

    <button @click="enableNotif"
      class="bg-green-500 px-4 py-2 rounded">
      Enable Notification
    </button>

  </div>

  <!-- NAVBAR BOTTOM -->
  <div class="fixed bottom-0 left-0 right-0 bg-gray-900 p-3 flex justify-around border-t border-gray-800">
    <button @click="tab='dashboard'" :class="tabClass('dashboard')">🏠</button>
    <button @click="tab='history'" :class="tabClass('history')">📜</button>
    <button @click="tab='settings'" :class="tabClass('settings')">⚙️</button>
  </div>

</div>

<script>
const API = "https://worker-bot.jihadwajib68.workers.dev";

Vue.createApp({
  data() {
    return {
      tab: "dashboard",
      signals: [],
      stats: {},
      winrate: 0,
      avgScore: 0,
      profit: 0,
      equity: [],
      chart: null,
      equityChart: null,
      pieChart: null
    }
  },

  methods: {

    async loadData() {
      const res = await fetch(API + "/signals");
      this.signals = await res.json();

      const statsRes = await fetch(API + "/stats");
      this.stats = await statsRes.json();

      this.calculate();
      this.renderChart();
      this.renderExtraCharts();
    },

    calculate() {
      if (!this.signals.length) return;

      let wins = 0, losses = 0, equity = 0;
      this.equity = [];

      this.signals.slice().reverse().forEach(s => {
        if (s.result === "WIN") {
          wins++;
          equity += 2;
        } else if (s.result === "LOSS") {
          losses++;
          equity -= 1;
        }
        this.equity.push(equity);
      });

      if (wins + losses > 0) {
        this.winrate = Math.round((wins / (wins + losses)) * 100);
      }

      const total = this.signals.length;
      const sum = this.signals.reduce((a, b) => a + b.score, 0);
      this.avgScore = (sum / total).toFixed(1);

      this.profit = equity;
    },

    renderChart() {
      const scores = this.signals.map(s => s.score).slice(0, 20).reverse();

      if (this.chart) this.chart.destroy();

      this.chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
          labels: scores.map((_, i) => i + 1),
          datasets: [{
            data: scores,
            tension: 0.4
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: { x: { display: false }, y: { display: false } }
        }
      });
    },

    renderExtraCharts() {

      if (this.equityChart) this.equityChart.destroy();
      if (this.pieChart) this.pieChart.destroy();

      // EQUITY
      this.equityChart = new Chart(document.getElementById("equityChart"), {
        type: "line",
        data: {
          labels: this.equity.map((_, i) => i + 1),
          datasets: [{
            data: this.equity,
            tension: 0.4
          }]
        }
      });

      // PIE
      const win = this.signals.filter(s => s.result === "WIN").length;
      const loss = this.signals.filter(s => s.result === "LOSS").length;

      this.pieChart = new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
          labels: ["Win", "Loss"],
          datasets: [{
            data: [win, loss]
          }]
        }
      });
    },

    tabClass(name) {
      return this.tab === name ? "text-blue-400" : "text-gray-400";
    },

    enableNotif() {
      Notification.requestPermission().then(p => {
        if (p === "granted") {
          new Notification("Notif aktif!");
        }
      });
    }

  },

  mounted() {
    this.loadData();
  }

}).mount("#app");
</script>

</body>
</html>
